<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포지마스터 탈것 계산기</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:white;padding:30px;}
h1{color:#ffd700;}
.card{background:#1e1e1e;padding:20px;margin-bottom:20px;border-radius:10px;}
select,input{padding:6px;margin:3px;}
.result{font-size:20px;color:#00ffc3;margin-top:10px;}
.stat{color:#ffd700;margin-top:5px;}
</style>

</head>

<body>

<h1>포지마스터 탈것 계산기</h1>
<p>제작자 : 21서버 Dominant 클랜 리더 Troud</p>

<div class="card">
<h2>기술 트리 티어 설정</h2>
<div id="tiers"></div>
</div>

<div class="card">
<h2>승천 / 레벨 설정</h2>

현재 승천
<select id="curAsc">
<option>0</option><option>1</option><option>2</option><option>3</option>
</select>

현재 레벨
<input id="curLvl" type="number" value="1">

<br><br>

목표 승천
<select id="tarAsc">
<option>0</option><option>1</option><option>2</option><option>3</option>
</select>

목표 레벨
<input id="tarLvl" type="number" value="10">

</div>

<div class="card">
<h2>계산 결과</h2>

<div class="result" id="summonCount"></div>
<div class="result" id="gearResult"></div>

</div>

<div class="card">
<h2>레벨별 필요 소환 횟수</h2>
<p>1~100 전 구간 필요 소환 횟수 20회로 동일</p>
</div>

<script>

// 🔥 UI 생성
function createUI(){

let html=""

// 비용 감소
html+="<b>탈것 소환 비용 감소</b><br>"
for(let i=1;i<=5;i++){
html+="T"+i+" <select id='cost"+i+"' onchange='handleTier(\"cost\","+i+")'>"
for(let j=0;j<=5;j++) html+="<option>"+j+"</option>"
html+="</select> "
}
html+="<div class='stat' id='costStat'></div><br>"

// 추가 기회
html+="<b>추가 탈것 기회</b><br>"
for(let i=1;i<=5;i++){
html+="T"+i+" <select id='bonus"+i+"' onchange='handleTier(\"bonus\","+i+")'>"
for(let j=0;j<=5;j++) html+="<option>"+j+"</option>"
html+="</select> "
}
html+="<div class='stat' id='bonusStat'></div>"

document.getElementById("tiers").innerHTML=html
}

// 🔥 티어 로직
function handleTier(type,t){

let id=type+t
let val=Number(document.getElementById(id).value)

// 0 → 상위 0
if(val===0){
for(let i=t+1;i<=5;i++){
document.getElementById(type+i).value=0
}
}

// 2↑ → 하위 5
if(val>=2){
for(let i=1;i<t;i++){
let el=document.getElementById(type+i)
if(Number(el.value)===0) el.value=5
}
}

calculate()
}

function getTotal(type){
let sum=0
for(let i=1;i<=5;i++){
sum+=Number(document.getElementById(type+i).value)
}
return sum
}

// 🔥 계산
function calculate(){

let costReduction=getTotal("cost")*0.01
let bonus=getTotal("bonus")*0.02

document.getElementById("costStat").innerText=
"현재 효과 : "+(costReduction*100).toFixed(1)+"%"

document.getElementById("bonusStat").innerText=
"현재 효과 : "+(bonus*100).toFixed(1)+"%"

let curAsc=Number(curAscEl.value)
let tarAsc=Number(tarAscEl.value)
let curLvl=Number(curLvlEl.value)
let tarLvl=Number(tarLvlEl.value)

let totalCount=0

while(true){

if(curAsc===tarAsc){
totalCount+=(tarLvl-curLvl)*20
break
}

totalCount+=(100-curLvl)*20

curAsc++
curLvl=1
}

// 🔥 비용 계산
let costPer=Math.round(50*(1-costReduction))

let totalGear=totalCount*costPer

let finalGear=totalGear/(1+bonus)

let gearCeil=Math.ceil(finalGear)
let gearK=(gearCeil/1000).toFixed(1).replace(/\.0$/,"")

summonCount.innerText="필요 소환 횟수 : "+totalCount.toLocaleString()
gearResult.innerText="필요 태엽 : "+gearCeil.toLocaleString()+" ("+gearK+"k)"
}

// DOM
const curAscEl=document.getElementById("curAsc")
const tarAscEl=document.getElementById("tarAsc")
const curLvlEl=document.getElementById("curLvl")
const tarLvlEl=document.getElementById("tarLvl")

const summonCount=document.getElementById("summonCount")
const gearResult=document.getElementById("gearResult")

document.querySelectorAll("input,select").forEach(el=>{
el.oninput=calculate
})

createUI()
calculate()

</script>

</body>
</html>
